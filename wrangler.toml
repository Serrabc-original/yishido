name = "yishido-agent-gateway"
main = "src/index.js"
compatibility_date = "2026-06-05"

# =========================
# Durable Object
# =========================

[[durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationCoordinator"

[[migrations]]
tag = "v2-conversation-coordinator"
new_sqlite_classes = ["ConversationCoordinator"]

# =========================
# KV
# =========================

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "dff72b29bfe8442e80ebb370748f8c71"

# =========================
# R2
# =========================

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "yishido-generated-images"

# =========================
# Queue producer
# =========================

[[queues.producers]]
binding = "IMAGE_QUEUE"
queue = "yishido-image-jobs"

# =========================
# Queue consumer
# =========================

[[queues.consumers]]
queue = "yishido-image-jobs"
max_batch_size = 1
max_retries = 3

[[queues.producers]]
binding = "AUDIO_QUEUE"
queue = "yishido-audio-queue"

[[queues.consumers]]
queue = "yishido-audio-queue"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3

# =========================
# Variables normales
# =========================

[vars]
BUFFER_WAIT_SECONDS = "5"
IMAGE_MESSAGE_WAIT_SECONDS = "8"
BUFFER_MAX_WAIT_SECONDS = "15"
AUDIO_TURN_WAIT_SECONDS = "75"
AUDIO_TURN_RETRY_SECONDS = "3"
ORCHESTRATOR_PROVIDER = "claude"
ORCHESTRATOR_MODEL = ""
ROUTER_MODEL = "gpt-5-nano"
COPY_MODEL = "gpt-5-nano"
OPENAI_IMAGE_MODEL = "gpt-image-2"
VISION_MODEL = "gpt-4o-mini"
VISION_FALLBACK_MODEL = "gpt-5-mini"
AUDIO_TRANSCRIPTION_MODEL = "whisper-1"
MAX_AUDIO_SECONDS = "180"
DEBUG_LOGS = "false"
SAVE_CONVERSATION_LOGS = "false"
ENABLE_USER_STYLE_PROFILE = "false"
ENABLE_CUSTOMER_MEMORY = "false"
ENABLE_REMINDERS = "false"
ENABLE_TEMPLATE_MODULE = "false"
