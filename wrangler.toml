name = "yishido-agent-gateway"
main = "src/index.js"
compatibility_date = "2026-06-05"

# =========================
# Durable Object
# =========================

[[durable_objects.bindings]]
name = "CONVERSATION_DO"
class_name = "ConversationCoordinator"

[[migrations]]
tag = "v2-conversation-coordinator"
new_sqlite_classes = ["ConversationCoordinator"]

# =========================
# KV
# =========================

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "dff72b29bfe8442e80ebb370748f8c71"

# =========================
# R2
# =========================

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "yishido-generated-images"

# =========================
# Queue producer
# =========================

[[queues.producers]]
binding = "IMAGE_QUEUE"
queue = "yishido-image-jobs"

# =========================
# Queue consumer
# =========================

[[queues.consumers]]
queue = "yishido-image-jobs"
max_batch_size = 1
max_retries = 3

[[queues.producers]]
binding = "AUDIO_QUEUE"
queue = "yishido-audio-queue"

[[queues.consumers]]
queue = "yishido-audio-queue"
max_batch_size = 5
max_batch_timeout = 30
max_retries = 3

# =========================
# Variables normales
# =========================

[vars]
BUFFER_WAIT_SECONDS = "10"
IMAGE_MESSAGE_WAIT_SECONDS = "15"
BUFFER_MAX_WAIT_SECONDS = "15"
AUDIO_TURN_WAIT_SECONDS = "75"
AUDIO_TURN_RETRY_SECONDS = "3"
ORCHESTRATOR_PROVIDER = "openai"
ORCHESTRATOR_MODEL = "gpt-5.4"
ORCHESTRATOR_FALLBACK_PROVIDER = ""
SUPERVISOR_MODEL = "gpt-5.4"
SUPERVISOR_FALLBACK_MODEL = "gpt-5.4-mini"
ROUTER_MODEL = "gpt-5.4-nano"
SPECIALIST_DEFAULT_MODEL = "gpt-5.4-mini"
SPECIALIST_CHEAP_MODEL = "gpt-5.4-nano"
FINAL_RESPONSE_MODEL = "gpt-5.4-mini"
CUSTOMER_REPLY_AI_ENABLED = "true"
CUSTOMER_REPLY_MODEL = "gpt-5.4-mini"
COPY_MODEL = "gpt-5.4-nano"
OPENAI_IMAGE_MODEL = "gpt-image-2"
OPENAI_REASONING_EFFORT = "low"
VISION_MODEL = "gpt-5.4-mini"
VISION_FALLBACK_MODEL = "gpt-5.4-mini"
AUDIO_TRANSCRIPTION_MODEL = "whisper-1"
MAX_AUDIO_SECONDS = "180"
DEBUG_LOGS = "true"
SAVE_CONVERSATION_LOGS = "true"
ENABLE_USER_STYLE_PROFILE = "true"
ENABLE_CUSTOMER_MEMORY = "true"
ENABLE_REMINDERS = "true"
ENABLE_LISTS = "true"
ENABLE_WHATSAPP_INTERACTIVE = "true"
ENABLE_TEMPLATE_MODULE = "true"
CORE_UTILITIES_SANDBOX = "true"
REMINDERS_DELIVERY_MODE = "alarm"
DAILY_USAGE_REPORT_ENABLED = "true"
DAILY_USAGE_REPORT_HOUR = "18"
REMINDER_TEMPLATE_NAME = ""
REMINDER_TEMPLATE_LANGUAGE = "es"
REMINDER_TEMPLATE_NAMESPACE = ""
REMINDER_TEMPLATE_PARAM_MODE = "body_text"
INTERACTIVE_DELIVERY_MODE = "safe"
MEMORY_RETENTION_MODE = "summarized"
LOG_CAPTURE_MODE = "console_and_file"
FAST_ACK_ENABLED = "true"
FAST_ACK_DELAY_MS = "1200"
FAST_ACK_MIN_COMPLEXITY = "medium"
CONVERSATIONAL_SPLIT_ENABLED = "true"
CONVERSATIONAL_SPLIT_MAX_CHARS = "650"
CONVERSATIONAL_SPLIT_DELAY_MS = "750"
